name: Build Spade UF2
on:
  push:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-uf2:
    runs-on: ubuntu-latest
    steps:
      - name: Install OpenOCD
        run: sudo apt-get update && sudo apt-get install -y openocd

      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Build Spade (Docker)
        run: |
          cd firmware/spade
          python3 gardenshed.py build

      - name: Upload firmware.uf2
        uses: actions/upload-artifact@v4
        with:
          name: firmware.uf2
          path: firmware/spade/firmware.uf2
          if-no-files-found: error
